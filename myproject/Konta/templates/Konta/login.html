{% extends 'layout.html' %}

{% block title %}
    Login
{% endblock %}

{% block content %}

<div class="auth-container">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}


    <input 
    type="text"
    name="username"
    placeholder="Username"
    autocomplete="off"
    required>

    <input
    type="password"
    name="password"
    placeholder="Password"
    autocomplete="off"
    required>

<button type="submit">
    Login
</button>

</form>

    <p>
        Nie masz konta?
        <a href="/register">Zarejestruj się</a>
    </p>

</div>

{% endblock %}
